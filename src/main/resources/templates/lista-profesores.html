<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Profesores</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
        header { background: #1f4e79; color: white; padding: 20px; text-align: center; }
        header p { margin: 5px 0 0; font-size: 14px; opacity: 0.85; }
        .contenedor { width: 90%; max-width: 1000px; margin: 30px auto; }
        .btn-volver { display: inline-block; background: #1f4e79; color: white; padding: 10px 18px; border-radius: 6px; text-decoration: none; margin-bottom: 20px; font-size: 14px; }
        .btn-volver:hover { background: #163a5f; }
        .tabla-wrapper { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); padding: 25px; }
        .tabla-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tabla-header h2 { margin: 0; color: #1f4e79; }
        .btn-nuevo { background: #1f4e79; color: white; padding: 10px 18px; border-radius: 6px; text-decoration: none; font-size: 14px; }
        .btn-nuevo:hover { background: #163a5f; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1f4e79; color: white; padding: 12px 10px; text-align: left; }
        td { padding: 11px 10px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #f0f4f8; }
        .btn-editar { background: #2e86de; color: white; padding: 6px 12px; border-radius: 5px; text-decoration: none; font-size: 13px; margin-right: 5px; }
        .btn-editar:hover { background: #1a6bbf; }
        .btn-borrar { background: #e74c3c; color: white; padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 13px; }
        .btn-borrar:hover { background: #c0392b; }
        footer { text-align: center; margin-top: 40px; padding: 20px; color: #666; }
    </style>
</head>
<body>
<header>
    <h1>Listado de Profesores</h1>
    <p>Todos los profesores registrados en la base de datos</p>
</header>

<div class="contenedor">
    <a class="btn-volver" th:href="@{/dashboard}">&#8592; Volver al Dashboard</a>

    <div class="tabla-wrapper">
        <div class="tabla-header">
            <h2>Profesores</h2>
            <a class="btn-nuevo" th:href="@{/profesores/nuevo}">+ Nuevo Profesor</a>
        </div>
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Departamento</th>
                <th>Nº Cursos</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="profesor : ${profesores}">
                <td th:text="${profesor.nombre}">-</td>
                <td th:text="${profesor.email}">-</td>
                <td th:text="${profesor.departamento}">-</td>
                <td th:text="${profesor.cursos.size()}">0</td>
                <td>
                    <a class="btn-editar" th:href="@{/profesores/editar/{id}(id=${profesor.id})}">Editar</a>
                    <form th:action="@{/profesores/borrar/{id}(id=${profesor.id})}" method="post" style="display:inline;">
                        <button class="btn-borrar" type="submit" onclick="return confirm('Seguro que quieres borrar este profesor?')">Borrar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<footer>Aplicación Spring Boot + Supabase</footer>
</body>
</html>
